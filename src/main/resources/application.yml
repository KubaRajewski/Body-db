micronaut:
  application:
    name: body-db
  http:
    client:
      read-timeout: 60s
    server:
      netty:
        access-logger:
          enabled: true
          logger-name: HTTP_ACCESS_LOG
  scheduler:
    enabled: true

bodydb:
  api-key: ${BODYDB_API_KEY:}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: https://api.anthropic.com
  model: claude-sonnet-4-6
  version: "2023-06-01"

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}
  base-url: https://api.telegram.org

datasources:
  default:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bodydb}
    username: ${POSTGRES_USER:bodydb}
    password: ${POSTGRES_PASSWORD:bodydb}
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    schema-generate: none

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration
